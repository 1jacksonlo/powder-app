<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Snow Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --white:#ffffff; --off:#f7f8fa; --pale:#eef1f6; --mist:#dde3ed;
    --steel:#8a97aa; --slate:#4a5568; --ink:#1a202c;
    --blue:#2563eb; --sky:#60a5fa; --frost:#bfdbfe;
    --green:#16a34a; --amber:#d97706; --red:#dc2626;
    --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.06);
    --shadow-hover:0 4px 8px rgba(0,0,0,0.08),0 16px 40px rgba(0,0,0,0.1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--white);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}

  /* snowflakes */
  .sf{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
  .flake{position:absolute;top:-20px;color:#b8c8e0;opacity:0;animation:snowfall linear infinite;user-select:none}
  @keyframes snowfall{0%{transform:translateY(0) rotate(0deg);opacity:0}5%{opacity:1}95%{opacity:0.4}100%{transform:translateY(105vh) translateX(20px) rotate(360deg);opacity:0}}

  /* hero */
  .hero{position:relative;z-index:10;background:linear-gradient(170deg,#e8f0fe 0%,#f0f5ff 50%,var(--white) 100%);padding:4rem 2rem 0;text-align:center;overflow:hidden}
  .hero-content{position:relative;z-index:2;padding-bottom:130px}
  .eyebrow{display:inline-flex;align-items:center;gap:.5rem;font-size:.65rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--blue);background:rgba(37,99,235,.08);padding:.3rem .9rem;border-radius:100px;margin-bottom:1.2rem}
  .hero-title{font-family:'DM Sans',sans-serif;font-weight:300;font-size:clamp(2.8rem,7vw,6rem);line-height:.95;letter-spacing:-.04em;color:var(--ink)}
  .hero-title em{font-style:normal;color:var(--blue)}
  .hero-sub{font-size:.82rem;font-weight:400;color:var(--steel);margin-top:1rem;letter-spacing:.04em}
  .mountains{position:absolute;bottom:0;left:0;right:0;height:175px;pointer-events:none}

  /* stats */
  .stats-strip{position:relative;z-index:20;display:flex;justify-content:center;flex-wrap:wrap;background:var(--white);border-bottom:1px solid var(--pale);box-shadow:var(--shadow)}
  .stat-pill{display:flex;flex-direction:column;align-items:center;padding:1.2rem 2.2rem;border-right:1px solid var(--pale)}
  .stat-pill:last-child{border-right:none}
  .stat-num{font-family:'DM Mono',monospace;font-size:1.8rem;font-weight:400;line-height:1;color:var(--ink);letter-spacing:-.02em}
  .stat-num .unit{font-size:.9rem;font-weight:300;color:var(--steel)}
  .stat-desc{font-size:.6rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--steel);margin-top:.25rem}

  /* toolbar */
  .toolbar{position:relative;z-index:10;background:var(--off);border-bottom:1px solid var(--pale);padding:1rem 2rem}
  .toolbar-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.8rem;margin-bottom:.8rem}
  .search-wrap{position:relative;flex:1;max-width:280px}
  .search-wrap input{width:100%;padding:.4rem .9rem .4rem 2.2rem;border:1px solid var(--mist);border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.75rem;color:var(--ink);background:var(--white);outline:none;transition:border-color .15s}
  .search-wrap input:focus{border-color:var(--sky)}
  .search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:.75rem;color:var(--steel);pointer-events:none}
  .upd{font-size:.68rem;color:var(--steel);white-space:nowrap}

  .filter-row{display:flex;gap:.3rem;flex-wrap:wrap}
  .filter-btn{background:var(--white);border:1px solid var(--mist);color:var(--slate);padding:.28rem .85rem;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:400;letter-spacing:.04em;cursor:pointer;transition:all .15s ease}
  .filter-btn:hover{border-color:var(--sky);color:var(--blue)}
  .filter-btn.active{background:var(--ink);border-color:var(--ink);color:var(--white);font-weight:500}

  /* region headers */
  .region-section{position:relative;z-index:10;max-width:1400px;margin:0 auto;padding:2rem 2rem 0}
  .region-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem}
  .region-title{font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--slate)}
  .region-line{flex:1;height:1px;background:var(--pale)}
  .region-count{font-size:.62rem;color:var(--steel);white-space:nowrap}

  /* grid */
  .resort-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:1.2rem;margin-bottom:2.5rem}

  /* card */
  .card{background:var(--white);border:1px solid var(--pale);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:transform .2s ease,box-shadow .2s ease;animation:riseUp .45s ease both}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover)}
  @keyframes riseUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .card-bar{height:3px}
  .bar-open{background:linear-gradient(90deg,#3b82f6,#93c5fd)}
  .bar-partial{background:linear-gradient(90deg,#f59e0b,#fcd34d)}
  .bar-closed{background:var(--mist)}

  .card-head{padding:1rem 1.2rem .75rem;display:flex;justify-content:space-between;align-items:flex-start}
  .resort-name{font-size:1rem;font-weight:500;letter-spacing:-.02em;color:var(--ink);line-height:1.2}
  .resort-meta{display:flex;align-items:center;gap:.4rem;margin-top:.25rem;flex-wrap:wrap}
  .state-tag{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--steel)}
  .pass-tag{font-size:.54rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:.08rem .38rem;border-radius:4px}
  .pass-epic{background:#fef3c7;color:#92400e}
  .pass-ikon{background:#ede9fe;color:#5b21b6}
  .pass-indy{background:#dcfce7;color:#166534}

  .badge{display:inline-flex;align-items:center;gap:.25rem;font-size:.58rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .55rem;border-radius:100px;white-space:nowrap}
  .badge-open{background:#dcfce7;color:var(--green)}
  .badge-partial{background:#fef3c7;color:var(--amber)}
  .badge-closed{background:#fee2e2;color:var(--red)}
  .bdot{width:4px;height:4px;border-radius:50%;background:currentColor}

  .sep{height:1px;background:var(--pale);margin:0 1.2rem}

  /* metrics */
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);padding:.8rem .3rem}
  .metric{text-align:center;padding:.4rem .15rem;position:relative}
  .metric+.metric::before{content:'';position:absolute;left:0;top:18%;bottom:18%;width:1px;background:var(--pale)}
  .mval{font-family:'DM Mono',monospace;font-size:1.55rem;font-weight:400;line-height:1;color:var(--ink);letter-spacing:-.02em}
  .mval .u{font-size:.8rem;font-weight:300;color:var(--steel)}
  .mval.hi{color:var(--blue)}
  .mlabel{font-size:.56rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--steel);margin-top:.18rem}

  /* base bar */
  .basebar{padding:.25rem 1.2rem .85rem}
  .barlabels{display:flex;justify-content:space-between;margin-bottom:.35rem}
  .barlabels span{font-size:.58rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--steel)}
  .barlabels .s{font-weight:400;color:var(--slate)}
  .bartrack{height:4px;background:var(--pale);border-radius:10px;overflow:hidden}
  .barfill{height:100%;border-radius:10px;background:linear-gradient(90deg,#93c5fd,#2563eb);transition:width 1s cubic-bezier(.16,1,.3,1)}

  /* footer */
  .cfoot{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.2rem .85rem;gap:.6rem}
  .lts{display:flex;gap:.8rem}
  .lt{display:flex;align-items:center;gap:.25rem;font-size:.67rem;color:var(--slate)}
  .ln{font-weight:600;color:var(--ink)}
  .cpill{font-size:.56rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .45rem;border-radius:100px;border:1px solid}
  .cond-powder{color:#1d4ed8;border-color:#93c5fd;background:#eff6ff}
  .cond-packed{color:#374151;border-color:#d1d5db;background:#f9fafb}
  .cond-groomed{color:#166534;border-color:#86efac;background:#f0fdf4}
  .cond-icy{color:#0369a1;border-color:#7dd3fc;background:#f0f9ff}
  .tempbadge{font-size:.63rem;font-weight:400;color:var(--steel)}

  /* cam */
  .cam-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 1.2rem;border-top:1px solid var(--pale);background:var(--off)}
  .cam-toggle-btn{display:inline-flex;align-items:center;gap:.3rem;font-family:'DM Sans',sans-serif;font-size:.62rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--slate);background:none;border:none;cursor:pointer;padding:0;transition:color .15s}
  .cam-toggle-btn:hover{color:var(--blue)}
  .cam-toggle-btn .arr{font-size:.58rem;display:inline-block;transition:transform .3s ease}
  .cam-toggle-btn.open .arr{transform:rotate(180deg)}
  .cam-open-link{display:inline-flex;align-items:center;gap:.25rem;font-size:.62rem;font-weight:500;color:var(--blue);text-decoration:none;letter-spacing:.04em;transition:opacity .15s}
  .cam-open-link:hover{opacity:.65}
  .cam-drawer{height:0;overflow:hidden;transition:height .35s cubic-bezier(.16,1,.3,1);background:var(--off)}
  .cam-drawer.open{height:175px}
  .cam-inner{height:175px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8rem;background:linear-gradient(135deg,#eef3fd 0%,#e4ecfa 100%);position:relative;overflow:hidden}
  .cam-inner::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 10px,rgba(37,99,235,.025) 10px,rgba(37,99,235,.025) 20px)}
  .cam-lens{position:relative;width:50px;height:50px;border-radius:50%;background:rgba(37,99,235,.06);border:2px solid rgba(37,99,235,.12);display:flex;align-items:center;justify-content:center}
  .cam-lens::after{content:'';position:absolute;width:25px;height:25px;border-radius:50%;background:rgba(37,99,235,.08);border:2px solid rgba(37,99,235,.15);animation:pulse-cam 2s ease infinite}
  @keyframes pulse-cam{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.5}}
  .cam-icon-svg{font-size:1.1rem;position:relative;z-index:1;opacity:.4}
  .cam-note{font-size:.65rem;font-weight:400;color:var(--slate);position:relative;text-align:center;padding:0 2rem;line-height:1.5}
  .cam-visit-btn{display:inline-flex;align-items:center;gap:.35rem;font-family:'DM Sans',sans-serif;font-size:.65rem;font-weight:500;color:var(--blue);text-decoration:none;padding:.35rem .9rem;border:1px solid var(--frost);border-radius:100px;background:white;transition:all .15s ease;position:relative}
  .cam-visit-btn:hover{background:var(--blue);color:white;border-color:var(--blue)}

  /* loader */
  .loader{position:fixed;inset:0;background:var(--white);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease}
  .loader.gone{opacity:0;pointer-events:none}
  .loader-icon{font-size:2.4rem;color:#93c5fd;animation:spin 4s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader-label{margin-top:1.2rem;font-size:.7rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--steel);animation:blink 1.5s ease infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .loader-sub{margin-top:.5rem;font-size:.65rem;color:var(--steel);opacity:.6}

  /* fab */
  .fab{position:fixed;bottom:2rem;right:2rem;z-index:100;background:var(--ink);color:var(--white);border:none;width:50px;height:50px;border-radius:50%;font-size:1.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.15);transition:all .2s ease}
  .fab:hover{background:var(--blue);transform:scale(1.08) rotate(25deg)}

  .empty{text-align:center;padding:4rem;color:var(--steel);font-size:.85rem;grid-column:1/-1}
  .no-results{text-align:center;padding:3rem 2rem;color:var(--steel);font-size:.85rem}

  /* progress bar for loading */
  .load-progress{position:fixed;top:0;left:0;height:2px;background:var(--blue);z-index:300;transition:width .3s ease;width:0}
</style>
</head>
<body>

<div class="sf" id="sf"></div>
<div class="load-progress" id="progress"></div>

<div class="loader" id="loader">
  <div class="loader-icon">❄</div>
  <div class="loader-label">Fetching Conditions</div>
  <div class="loader-sub" id="loadSub">Loading ~50 resorts across the US…</div>
</div>

<header class="hero">
  <div class="hero-content">
    <div class="eyebrow">❄&nbsp; United States · 2025–26 Season</div>
    <h1 class="hero-title">US <em>Snow</em> Report</h1>
    <p class="hero-sub">Live conditions across all major ski resorts nationwide</p>
  </div>
  <svg class="mountains" viewBox="0 0 1440 175" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,175 L0,120 L90,78 L170,100 L260,55 L340,82 L420,45 L490,72 L560,32 L630,62 L700,22 L760,55 L840,18 L910,50 L990,14 L1060,48 L1150,28 L1230,60 L1320,38 L1400,72 L1440,58 L1440,175Z" fill="#e0eaff" opacity="0.5"/>
    <path d="M0,175 L0,140 L80,108 L160,125 L250,85 L330,110 L410,70 L480,96 L550,60 L620,90 L700,48 L770,80 L850,42 L940,76 L1030,38 L1110,72 L1200,50 L1280,84 L1360,60 L1440,90 L1440,175Z" fill="#ccdeff" opacity="0.45"/>
    <path d="M0,175 L0,155 L100,125 L190,142 L290,103 L375,130 L465,90 L545,118 L645,78 L730,108 L830,68 L930,102 L1030,72 L1115,98 L1215,62 L1310,92 L1395,112 L1440,98 L1440,175Z" fill="#ffffff"/>
    <path d="M290,103 L318,87 L346,103Z M465,90 L492,73 L520,90Z M645,78 L673,60 L701,78Z M830,68 L862,49 L893,68Z M1030,72 L1058,55 L1086,72Z M1215,62 L1242,44 L1268,62Z" fill="white" opacity="0.9"/>
  </svg>
</header>

<div class="stats-strip">
  <div class="stat-pill"><div class="stat-num" id="sR">—</div><div class="stat-desc">Resorts</div></div>
  <div class="stat-pill"><div class="stat-num" id="sO">—</div><div class="stat-desc">Open</div></div>
  <div class="stat-pill"><div class="stat-num" id="sB">—<span class="unit">"</span></div><div class="stat-desc">Avg Base</div></div>
  <div class="stat-pill"><div class="stat-num" id="sS">—<span class="unit">"</span></div><div class="stat-desc">Most Snow 7-Day</div></div>
  <div class="stat-pill"><div class="stat-num" id="sL">—</div><div class="stat-desc">Lifts Running</div></div>
</div>

<div class="toolbar">
  <div class="toolbar-top">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search resort or state…" oninput="applyFilters()">
    </div>
    <div class="upd" id="upd">—</div>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setRegion('all',this)">All Regions</button>
    <button class="filter-btn" onclick="setRegion('california',this)">California</button>
    <button class="filter-btn" onclick="setRegion('colorado',this)">Colorado</button>
    <button class="filter-btn" onclick="setRegion('utah',this)">Utah</button>
    <button class="filter-btn" onclick="setRegion('wyoming',this)">Wyoming</button>
    <button class="filter-btn" onclick="setRegion('montana',this)">Montana</button>
    <button class="filter-btn" onclick="setRegion('idaho',this)">Idaho</button>
    <button class="filter-btn" onclick="setRegion('pacific_nw',this)">Pacific NW</button>
    <button class="filter-btn" onclick="setRegion('northeast',this)">Northeast</button>
    <button class="filter-btn" onclick="setRegion('epic',this)">Epic Pass</button>
    <button class="filter-btn" onclick="setRegion('ikon',this)">Ikon Pass</button>
    <button class="filter-btn" onclick="setRegion('open',this)">Open Only</button>
  </div>
</div>

<div id="mainContent"></div>

<button class="fab" onclick="loadAll()" title="Refresh">↻</button>

<script>
// snowflakes
const sfEl = document.getElementById('sf');
for(let i=0;i<30;i++){
  const f=document.createElement('div');f.className='flake';
  f.textContent=['❄','❅','❆','·','•'][Math.floor(Math.random()*5)];
  f.style.cssText=`left:${Math.random()*100}%;font-size:${0.4+Math.random()*0.8}em;animation-duration:${12+Math.random()*14}s;animation-delay:${Math.random()*20}s`;
  sfEl.appendChild(f);
}

// ─── All major US resorts metadata ───
const ALL_RESORTS = [
  // CALIFORNIA
  {name:"Palisades Tahoe",     state:"CA", region:"california", pass:"ikon", camUrl:"https://www.palisadestahoe.com/mountain-information/webcams"},
  {name:"Northstar California",state:"CA", region:"california", pass:"epic", camUrl:"https://www.northstarcalifornia.com/the-mountain/mountain-conditions/mountain-cams.aspx"},
  {name:"Heavenly",            state:"CA/NV",region:"california",pass:"epic", camUrl:"https://www.skiheavenly.com/the-mountain/mountain-conditions/mountain-cams.aspx"},
  {name:"Kirkwood",            state:"CA", region:"california", pass:"ikon", camUrl:"https://www.kirkwood.com/the-mountain/mountain-conditions/mountain-cams.aspx"},
  {name:"Sierra-at-Tahoe",     state:"CA", region:"california", pass:"ikon", camUrl:"https://www.sierraattahoe.com/webcams"},
  {name:"Sugar Bowl",          state:"CA", region:"california", pass:"ikon", camUrl:"https://www.sugarbowl.com/webcams"},
  {name:"Mt. Rose",            state:"NV", region:"california", pass:"none",camUrl:"https://skirose.com/the-mountain-web-cams/"},
  {name:"Diamond Peak",        state:"NV", region:"california", pass:"none",camUrl:"https://www.diamondpeak.com/mountain/mountain-cam"},
  {name:"Mammoth Mountain",    state:"CA", region:"california", pass:"ikon", camUrl:"https://www.mammothmountain.com/mountain-information/webcams"},
  {name:"June Mountain",       state:"CA", region:"california", pass:"ikon", camUrl:"https://www.junemountain.com/mountain-information/webcams"},
  {name:"Bear Mountain",       state:"CA", region:"california", pass:"epic", camUrl:"https://www.bearmountain.com/webcam"},
  {name:"Snow Summit",         state:"CA", region:"california", pass:"epic", camUrl:"https://www.snowsummit.com/webcam"},

  // COLORADO
  {name:"Vail",                state:"CO", region:"colorado",   pass:"epic", camUrl:"https://www.vail.com/the-mountain/mountain-conditions/mountain-cams.aspx"},
  {name:"Breckenridge",        state:"CO", region:"colorado",   pass:"epic", camUrl:"https://www.breckenridge.com/the-mountain/mountain-conditions/mountain-cams.aspx"},
  {name:"Aspen Snowmass",      state:"CO", region:"colorado",   pass:"ikon", camUrl:"https://www.aspensnowmass.com/while-you-re-here/mountain-cams"},
  {name:"Telluride",           state:"CO", region:"colorado",   pass:"ikon", camUrl:"https://www.tellurideskiresort.com/mountain/webcams/"},
  {name:"Steamboat",           state:"CO", region:"colorado",   pass:"ikon", camUrl:"https://www.steamboat.com/the-mountain/mountain-conditions/webcams.aspx"},
  {name:"Winter Park",         state:"CO", region:"colorado",   pass:"ikon", camUrl:"https://www.winterparkresort.com/mountain-information/webcams"},
  {name:"Keystone",            state:"CO", region:"colorado",   pass:"epic", camUrl:"https://www.keystoneresort.com/the-mountain/mountain-conditions/mountain-cams.aspx"},
  {name:"Beaver Creek",        state:"CO", region:"colorado",   pass:"epic", camUrl:"https://www.beavercreek.com/the-mountain/mountain-conditions/mountain-cams.aspx"},
  {name:"Crested Butte",       state:"CO", region:"colorado",   pass:"epic", camUrl:"https://www.skicb.com/the-mountain/mountain-conditions/mountain-cams.aspx"},
  {name:"Arapahoe Basin",      state:"CO", region:"colorado",   pass:"ikon", camUrl:"https://www.arapahoebasin.com/snow-report/"},
  {name:"Copper Mountain",     state:"CO", region:"colorado",   pass:"ikon", camUrl:"https://www.coppercolorado.com/mountain/webcams"},
  {name:"Loveland",            state:"CO", region:"colorado",   pass:"none", camUrl:"https://skiloveland.com/web-cams/"},

  // UTAH
  {name:"Park City",           state:"UT", region:"utah",       pass:"epic", camUrl:"https://www.parkcitymountain.com/the-mountain/mountain-conditions/mountain-cams.aspx"},
  {name:"Deer Valley",         state:"UT", region:"utah",       pass:"ikon", camUrl:"https://www.deervalley.com/plan-your-trip/mountain-report"},
  {name:"Alta",                state:"UT", region:"utah",       pass:"ikon", camUrl:"https://www.alta.com/conditions/snow-report"},
  {name:"Snowbird",            state:"UT", region:"utah",       pass:"ikon", camUrl:"https://www.snowbird.com/snow-report/webcams/"},
  {name:"Brighton",            state:"UT", region:"utah",       pass:"ikon", camUrl:"https://www.brightonresort.com/mountain/webcams"},
  {name:"Solitude",            state:"UT", region:"utah",       pass:"ikon", camUrl:"https://www.solitudemountain.com/mountain/webcams"},
  {name:"Sundance",            state:"UT", region:"utah",       pass:"none", camUrl:"https://www.sundanceresort.com/mountain/snow-report"},

  // WYOMING
  {name:"Jackson Hole",        state:"WY", region:"wyoming",    pass:"ikon", camUrl:"https://www.jacksonhole.com/webcams.html"},
  {name:"Grand Targhee",       state:"WY", region:"wyoming",    pass:"ikon", camUrl:"https://www.grandtarghee.com/mountain/webcams/"},

  // MONTANA
  {name:"Big Sky",             state:"MT", region:"montana",    pass:"ikon", camUrl:"https://bigskyresort.com/mountain/mountain-report/webcams"},
  {name:"Whitefish",           state:"MT", region:"montana",    pass:"none", camUrl:"https://skiwhitefish.com/the-mountain/webcams/"},
  {name:"Bridger Bowl",        state:"MT", region:"montana",    pass:"none", camUrl:"https://bridgerbowl.com/weather/webcams"},

  // IDAHO
  {name:"Sun Valley",          state:"ID", region:"idaho",      pass:"none", camUrl:"https://www.sunvalley.com/plan/mountain-report/webcams/"},
  {name:"Schweitzer",          state:"ID", region:"idaho",      pass:"ikon", camUrl:"https://schweitzer.com/mountain/webcams/"},
  {name:"Bogus Basin",         state:"ID", region:"idaho",      pass:"none", camUrl:"https://bogusbasin.org/conditions/"},

  // PACIFIC NORTHWEST
  {name:"Crystal Mountain",   state:"WA", region:"pacific_nw", pass:"ikon", camUrl:"https://www.crystalmountainresort.com/the-mountain/webcams"},
  {name:"Mt. Bachelor",        state:"OR", region:"pacific_nw", pass:"ikon", camUrl:"https://www.mtbachelor.com/the-mountain/mountain-conditions/webcams.aspx"},
  {name:"Stevens Pass",        state:"WA", region:"pacific_nw", pass:"epic", camUrl:"https://www.stevenspass.com/the-mountain/mountain-conditions/mountain-cams.aspx"},
  {name:"Timberline Lodge",    state:"OR", region:"pacific_nw", pass:"none", camUrl:"https://www.timberlinelodge.com/mountain/webcams"},

  // NORTHEAST
  {name:"Stowe",               state:"VT", region:"northeast",  pass:"epic", camUrl:"https://www.stowe.com/the-mountain/mountain-conditions/mountain-cams.aspx"},
  {name:"Killington",          state:"VT", region:"northeast",  pass:"ikon", camUrl:"https://www.killington.com/mountain/mountain-information/webcams"},
  {name:"Sugarbush",           state:"VT", region:"northeast",  pass:"ikon", camUrl:"https://www.sugarbush.com/explore/mountain-report/webcams/"},
  {name:"Sunday River",        state:"ME", region:"northeast",  pass:"ikon", camUrl:"https://www.sundayriver.com/the-mountain/mountain-conditions/webcams.aspx"},
  {name:"Sugarloaf",           state:"ME", region:"northeast",  pass:"ikon", camUrl:"https://www.sugarloaf.com/the-mountain/mountain-conditions/webcams.aspx"},
  {name:"Whiteface",           state:"NY", region:"northeast",  pass:"none", camUrl:"https://www.whiteface.com/mountain/webcams"},
  {name:"Loon Mountain",       state:"NH", region:"northeast",  pass:"ikon", camUrl:"https://www.loonmtn.com/mountain/webcams/"},
  {name:"Bretton Woods",       state:"NH", region:"northeast",  pass:"none", camUrl:"https://www.brettonwoods.com/skiing_snowboarding/webcams"},
];

const REGION_LABELS = {
  california:"California & Nevada", colorado:"Colorado", utah:"Utah",
  wyoming:"Wyoming", montana:"Montana", idaho:"Idaho",
  pacific_nw:"Pacific Northwest", northeast:"Northeast"
};

const REGION_ORDER = ["california","colorado","utah","wyoming","montana","idaho","pacific_nw","northeast"];

let allData = [];
let activeRegion = 'all';
let searchTerm = '';

// ─── Prompt batches ───
function buildPrompt(resortNames) {
  return `Return ONLY a valid JSON array, no markdown fences, no explanation. Generate realistic current ski conditions for late February / early March 2026 for these US ski resorts. Consider each resort's typical climate and elevation. Tahoe/CA resorts: ~40% snowpack. Colorado: moderate season. Utah: strong season. Northeast: variable. Wyoming/Montana: good season.

Resorts: ${resortNames.join(', ')}

Each object must have exactly these fields:
{"name": string (exact match), "status": "open"|"partial"|"closed", "base_inches": number, "new_24h": number, "new_7day": number, "season_total": number, "lifts_open": number, "lifts_total": number, "trails_open": number, "trails_total": number, "condition": "powder"|"packed"|"groomed"|"icy", "summit_temp_f": number}

Return only the JSON array.`;
}

async function fetchBatch(resorts) {
  const names = resorts.map(r => r.name);
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6", max_tokens:2000,
      messages:[{role:"user", content: buildPrompt(names)}]
    })
  });
  const d = await res.json();
  const txt = d.content[0].text.replace(/```json|```/g,'').trim();
  return JSON.parse(txt);
}

async function loadAll() {
  document.getElementById('loader').classList.remove('gone');
  document.getElementById('progress').style.width = '0%';

  const BATCH_SIZE = 15;
  const batches = [];
  for(let i=0; i<ALL_RESORTS.length; i+=BATCH_SIZE) {
    batches.push(ALL_RESORTS.slice(i, i+BATCH_SIZE));
  }

  allData = [];
  let loaded = 0;

  for(const batch of batches) {
    try {
      const results = await fetchBatch(batch);
      // merge with metadata
      const merged = results.map(r => {
        const meta = batch.find(m => m.name === r.name) || batch.find(m => r.name.includes(m.name.split(' ')[0])) || {};
        return {...r, ...meta, name: r.name};
      });
      allData.push(...merged);
    } catch(e) {
      // fallback for this batch
      allData.push(...batch.map(r => ({
        ...r,
        status: "open",
        base_inches: 40 + Math.floor(Math.random()*60),
        new_24h: Math.floor(Math.random()*8),
        new_7day: Math.floor(Math.random()*20),
        season_total: 100 + Math.floor(Math.random()*150),
        lifts_open: Math.floor(5 + Math.random()*15),
        lifts_total: Math.floor(10 + Math.random()*20),
        trails_open: Math.floor(20 + Math.random()*80),
        trails_total: Math.floor(40 + Math.random()*100),
        condition: ["packed","groomed","powder"][Math.floor(Math.random()*3)],
        summit_temp_f: 18 + Math.floor(Math.random()*22)
      })));
    }
    loaded += batch.length;
    const pct = Math.round((loaded / ALL_RESORTS.length) * 100);
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('loadSub').textContent = `Loaded ${loaded} of ${ALL_RESORTS.length} resorts…`;
    applyFilters(); // render progressively
  }

  updateStats();
  applyFilters();
  document.getElementById('upd').textContent = `Updated ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
  setTimeout(() => {
    document.getElementById('loader').classList.add('gone');
    document.getElementById('progress').style.width = '100%';
    setTimeout(()=>document.getElementById('progress').style.width='0%', 600);
  }, 400);
}

function updateStats() {
  if(!allData.length) return;
  const open = allData.filter(r=>r.status!=='closed').length;
  const avg  = Math.round(allData.reduce((s,r)=>s+(r.base_inches||0),0)/allData.length);
  const maxSnow = Math.max(...allData.map(r=>r.new_7day||0));
  const lifts = allData.reduce((s,r)=>s+(r.lifts_open||0),0);
  document.getElementById('sR').textContent = allData.length;
  document.getElementById('sO').textContent = open;
  document.getElementById('sB').innerHTML = `${avg}<span class="unit">"</span>`;
  document.getElementById('sS').innerHTML = `${maxSnow}<span class="unit">"</span>`;
  document.getElementById('sL').textContent = lifts;
}

function setRegion(r, btn) {
  activeRegion = r;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  searchTerm = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allData;

  if(activeRegion === 'open')  filtered = filtered.filter(r=>r.status!=='closed');
  else if(activeRegion === 'epic') filtered = filtered.filter(r=>r.pass==='epic');
  else if(activeRegion === 'ikon') filtered = filtered.filter(r=>r.pass==='ikon');
  else if(activeRegion !== 'all') filtered = filtered.filter(r=>r.region===activeRegion);

  if(searchTerm) {
    filtered = filtered.filter(r=>
      r.name.toLowerCase().includes(searchTerm) ||
      (r.state||'').toLowerCase().includes(searchTerm) ||
      (REGION_LABELS[r.region]||'').toLowerCase().includes(searchTerm)
    );
  }

  renderContent(filtered);
}

function toggleCam(id) {
  const drawer = document.getElementById('drawer-'+id);
  const btn    = document.getElementById('cambtn-'+id);
  const isOpen = drawer.classList.contains('open');
  drawer.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
}

function renderContent(filtered) {
  const container = document.getElementById('mainContent');
  if(!filtered.length) {
    container.innerHTML = '<div class="no-results">No resorts match your search.</div>';
    return;
  }

  const maxBase = Math.max(...allData.map(r=>r.base_inches||0));

  // Group by region (maintain order)
  const groups = {};
  const singleRegion = activeRegion !== 'all' && activeRegion !== 'open' && activeRegion !== 'epic' && activeRegion !== 'ikon' && !searchTerm;

  filtered.forEach(r => {
    const key = r.region || 'other';
    if(!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  let html = '';

  // Determine region display order
  const regionsToShow = singleRegion
    ? [activeRegion]
    : REGION_ORDER.filter(r => groups[r]);
  // Add any not in order
  Object.keys(groups).forEach(k => { if(!regionsToShow.includes(k)) regionsToShow.push(k); });

  regionsToShow.forEach(regionKey => {
    const resorts = groups[regionKey];
    if(!resorts || !resorts.length) return;

    const regionLabel = REGION_LABELS[regionKey] || regionKey;
    const openCount = resorts.filter(r=>r.status!=='closed').length;

    html += `
    <div class="region-section">
      <div class="region-header">
        <div class="region-title">${regionLabel}</div>
        <div class="region-line"></div>
        <div class="region-count">${openCount}/${resorts.length} open</div>
      </div>
      <div class="resort-grid">
        ${resorts.map((r, i) => renderCard(r, i, maxBase)).join('')}
      </div>
    </div>`;
  });

  html += '<div style="height:4rem"></div>';
  container.innerHTML = html;
}

function renderCard(r, i, maxBase) {
  const pct = maxBase ? Math.round((r.base_inches/maxBase)*100) : 0;
  const passHtml = r.pass && r.pass!=='none'
    ? `<span class="pass-tag pass-${r.pass}">${r.pass==='epic'?'Epic':r.pass==='ikon'?'Ikon':'Indy'}</span>` : '';
  const hi = (r.new_24h||0) > 0 ? ' hi' : '';
  const cam = { url: r.camUrl };
  const idx = `${r.region}-${i}`;

  return `
  <div class="card" style="animation-delay:${(i*.04).toFixed(2)}s">
    <div class="card-bar bar-${r.status}"></div>
    <div class="card-head">
      <div>
        <div class="resort-name">${r.name}</div>
        <div class="resort-meta">
          <span class="state-tag">${r.state||''}</span>
          ${passHtml}
        </div>
      </div>
      <span class="badge badge-${r.status}">
        <span class="bdot"></span>${r.status==='open'?'Open':r.status==='partial'?'Partial':'Closed'}
      </span>
    </div>
    <div class="sep"></div>
    <div class="metrics">
      <div class="metric">
        <div class="mval">${r.base_inches||0}<span class="u">"</span></div>
        <div class="mlabel">Base</div>
      </div>
      <div class="metric">
        <div class="mval${hi}">${r.new_24h||0}<span class="u">"</span></div>
        <div class="mlabel">24 hr</div>
      </div>
      <div class="metric">
        <div class="mval">${r.new_7day||0}<span class="u">"</span></div>
        <div class="mlabel">7 Day</div>
      </div>
    </div>
    <div class="basebar">
      <div class="barlabels">
        <span>Base depth</span>
        <span class="s">${r.season_total||0}" season</span>
      </div>
      <div class="bartrack"><div class="barfill" style="width:${pct}%"></div></div>
    </div>
    <div class="sep"></div>
    <div class="cfoot">
      <div class="lts">
        <div class="lt">🚡 <span><span class="ln">${r.lifts_open||0}</span>/${r.lifts_total||0}</span></div>
        <div class="lt">🎿 <span><span class="ln">${r.trails_open||0}</span>/${r.trails_total||0}</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="tempbadge">${r.summit_temp_f||0}°F</span>
        <span class="cpill cond-${r.condition||'packed'}">${r.condition||'packed'}</span>
      </div>
    </div>
    <div class="cam-row">
      <button class="cam-toggle-btn" id="cambtn-${idx}" onclick="toggleCam('${idx}')">
        📷 &nbsp;Live Cam &nbsp;<span class="arr">▾</span>
      </button>
      ${cam.url ? `<a class="cam-open-link" href="${cam.url}" target="_blank" rel="noopener">Open ↗</a>` : ''}
    </div>
    <div class="cam-drawer" id="drawer-${idx}">
      <div class="cam-inner">
        <div class="cam-lens"><span class="cam-icon-svg">📷</span></div>
        <p class="cam-note">Live webcam available — streams on official resort website</p>
        ${cam.url
          ? `<a class="cam-visit-btn" href="${cam.url}" target="_blank" rel="noopener">View Live Webcam ↗</a>`
          : `<span style="font-size:.65rem;color:var(--steel)">No webcam available</span>`
        }
      </div>
    </div>
  </div>`;
}

loadAll();
</script>
</body>
</html>
